name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 2: Java 17 설치
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'

      # Step 3: Gradle 캐시
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ★ 추가
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: 테스트 실행
      - name: Run tests
        run: ./gradlew test

      # Step 5: JAR 빌드
      - name: Build JAR
        run: ./gradlew bootJar

      # Step 6: AWS 자격증명
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 7: ECR 로그인
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Step 8: Docker 빌드 및 Push
      - name: Build and push Docker image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_URI=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}

          docker build --platform linux/arm64 -t $IMAGE_URI:$SHORT_SHA .
          docker push $IMAGE_URI:$SHORT_SHA

          echo "✅ Pushed: $IMAGE_URI:$SHORT_SHA"